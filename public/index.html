<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Professor de Idiomas Local</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-logo" src="/assets/gigaverse-logo.png" alt="Gigaverse 3D" />
          <div>
            <h1>Gigaverse 3D</h1>
            <p>Professor local de idiomas</p>
          </div>
        </div>

        <label class="field">
          <span>Idioma</span>
          <select id="language">
            <option value="japones">Japones</option>
            <option value="ingles">Ingles</option>
            <option value="espanhol">Espanhol</option>
            <option value="frances">Frances</option>
          </select>
        </label>

        <label class="field">
          <span>Nivel (chat)</span>
          <select id="level">
            <option value="iniciante">Iniciante</option>
            <option value="basico">Basico</option>
            <option value="intermediario">Intermediario</option>
            <option value="avancado">Avancado</option>
          </select>
        </label>

        <label class="field">
          <span>Modo (chat)</span>
          <select id="mode">
            <option value="aula curta">Aula curta</option>
            <option value="conversacao guiada">Conversacao</option>
            <option value="exercicios com correcao">Exercicios</option>
            <option value="correcao de texto">Correcao</option>
          </select>
        </label>

        <label class="field">
          <span>Voz</span>
          <select id="voiceGender">
            <option value="female">Mulher</option>
            <option value="male">Homem</option>
          </select>
        </label>

        <label class="field">
          <span>Velocidade da fala</span>
          <input id="speechRate" type="range" min="0.5" max="1.1" step="0.05" value="0.9" />
        </label>

        <button id="newLesson" class="secondary" type="button">Aula rapida por IA</button>

        <p id="aiStatus" class="ai-status">Verificando IA local...</p>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Gigaverse 3D - professor-idiomas</p>
            <h2>Laboratorio de Idiomas</h2>
          </div>
          <div class="topbar-right">
            <nav class="view-tabs" role="tablist" aria-label="Areas">
              <button class="view-tab active" type="button" data-view="trilha">Trilha de aulas</button>
              <button class="view-tab" type="button" data-view="chat">Chat / Conversacao</button>
            </nav>
            <span id="status" class="status">Pronto</span>
          </div>
        </header>

        <!-- VISAO: TRILHA -->
        <div id="view-trilha" class="view active">
          <section class="lesson-library" aria-label="Planos de aula">
            <div class="library-head">
              <div>
                <p class="eyebrow">Curriculo guiado - 50 aulas por nivel</p>
                <h3>Trilha de estudo</h3>
              </div>
              <div class="level-tabs" role="tablist" aria-label="Niveis">
                <button class="level-tab active" type="button" data-plan-level="basico">Basico</button>
                <button class="level-tab" type="button" data-plan-level="intermediario">Intermediario</button>
                <button class="level-tab" type="button" data-plan-level="avancado">Avancado</button>
              </div>
            </div>

            <div class="progress-wrap">
              <div class="progress-bar"><span id="progressFill" class="progress-fill"></span></div>
              <span id="progressLabel" class="progress-label">0 / 50 concluidas</span>
            </div>
          </section>

          <div id="lessonPlans" class="lesson-grid scroll-area"></div>
        </div>

        <!-- VISAO: CHAT -->
        <div id="view-chat" class="view">
          <div id="messages" class="messages scroll-area" aria-live="polite"></div>

          <div class="suggestions-bar">
            <span class="suggestions-label">Sugestoes de assunto</span>
            <div id="topicSuggestions" class="suggestions-chips"></div>
          </div>

          <form id="chatForm" class="composer">
            <textarea
              id="messageInput"
              rows="3"
              placeholder="Escreva sua pergunta, peca uma aula ou pratique uma frase..."
            ></textarea>
            <div class="composer-actions">
              <button id="sendButton" type="submit">Enviar</button>
              <button id="translateButton" class="ghost" type="button" title="Traduzir o texto do campo">Traduzir</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <!-- OVERLAY DE AULA -->
    <div id="lessonOverlay" class="overlay" hidden>
      <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="lessonTitle">
        <header class="overlay-head">
          <div>
            <span id="lessonBadge" class="lesson-meta">basico</span>
            <h3 id="lessonTitle">Aula</h3>
            <p id="lessonGoal" class="overlay-goal"></p>
          </div>
          <button id="closeLesson" class="icon-button" type="button" aria-label="Fechar">✕</button>
        </header>

        <div class="overlay-body scroll-area">
          <div class="media-row">
            <figure class="lesson-image">
              <img id="lessonImage" alt="" />
            </figure>
            <div class="lesson-video">
              <div id="videoPoster" class="video-poster">
                <span class="play-icon">▶</span>
                <p>Video-aula do tema</p>
              </div>
              <div class="video-actions">
                <button id="watchHere" class="ghost" type="button">Assistir aqui</button>
                <a id="watchYoutube" class="ghost" target="_blank" rel="noreferrer">Abrir no YouTube</a>
              </div>
            </div>
          </div>

          <div class="lesson-content-actions">
            <button id="generateLesson" class="primary-action" type="button">Gerar conteudo com IA</button>
            <button id="practiceChat" class="ghost" type="button">Praticar no chat</button>
            <button id="completeLesson" class="ghost" type="button">Marcar como concluida</button>
          </div>

          <div id="lessonContent" class="lesson-content"></div>
        </div>
      </div>
    </div>

    <script src="/curriculum.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
